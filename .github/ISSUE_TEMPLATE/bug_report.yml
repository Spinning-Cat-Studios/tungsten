---
name: Bug Report
description: Report a compiler bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: Tungsten version
      description: Output of `tungsten --version`
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15.3 (arm64), Ubuntu 24.04 (x86_64)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A minimal `.tg` file or set of commands that reproduces the issue.
      render: text
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Full compiler output (paste as-is).
      render: text
