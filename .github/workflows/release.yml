name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # macOS: ship self-compiled binary (tungsten1) with L3 verification
  build-macos:
    name: Build (macOS ARM64)
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
      - uses: Swatinem/rust-cache@v2
      
      - name: Install LLVM 18
        run: brew install llvm@18 zstd
      
      - name: Build bootstrap compiler
        env:
          LLVM_SYS_180_PREFIX: /opt/homebrew/opt/llvm@18
          LIBRARY_PATH: /opt/homebrew/lib
        run: cargo build --release
      
      - name: Self-compile — bootstrap → tungsten1
        env:
          LLVM_SYS_180_PREFIX: /opt/homebrew/opt/llvm@18
          LIBRARY_PATH: /opt/homebrew/lib
        run: ./target/release/tungsten compile src/compiler/main.tg -o tungsten1 -v
      
      - name: Verify — tungsten1 typechecks itself (L3)
        run: ./tungsten1 check src/compiler/main.tg --max-errors=0
      
      - name: Package release archive
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="tungsten-${TAG}-macos-arm64"
          ./scripts/package-macos.sh tungsten1 target/release/tungsten "$ARCHIVE"
          cp -R examples README.md LICENSE "$ARCHIVE/"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: ${{ env.ARCHIVE }}

  # Linux: ship bootstrap (Rust-built) binary
  # x86_64 self-host deferred to v1.5 — ships bootstrap binary for now
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
      - uses: Swatinem/rust-cache@v2
      
      - name: Install LLVM 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev clang-18 lld-18 zlib1g-dev libzstd-dev
      
      - name: Build bootstrap compiler
        env:
          LLVM_SYS_180_PREFIX: /usr/lib/llvm-18
        run: cargo build --release
      
      - name: Package release archive
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="tungsten-${TAG}-linux-x86_64"
          ./scripts/package-linux.sh target/release/tungsten "$ARCHIVE"
          cp -R examples README.md LICENSE "$ARCHIVE/"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x86_64
          path: ${{ env.ARCHIVE }}

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec cp {} . \;
          shasum -a 256 *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Extract release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NOTES="changelog/v${VERSION}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::No changelog found at $NOTES"
            exit 1
          fi
          cp "$NOTES" release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
